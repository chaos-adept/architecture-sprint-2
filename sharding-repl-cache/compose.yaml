version: '3'

services:
  redis_node:
    image: "redis:latest"
    container_name: redis_node
    ports:
      - "6379"
    volumes:
      - redis_node_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]

  # Первый шард
  shard1-1:
    image: mongo:latest
    container_name: shard1-1
    restart: always
    ports:
      - "27021:27017"
    volumes:
      - shard1-1-data:/data/db
    command:
      [
        "mongod", 
        "--shardsvr", 
        "--replSet", 
        "rs_shard1", 
        "--bind_ip_all", 
        "--port", 
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongosh","--port", "27017", "--eval", "db.runCommand('ping').ok", "--quiet" ]
      interval: 5s
      timeout: 15s
      retries: 3

  shard1-2:
    image: mongo:latest
    container_name: shard1-2
    restart: always
    ports:
      - "27022:27017"
    volumes:
      - shard1-2-data:/data/db
    command:
      [
        "mongod", 
        "--shardsvr", 
        "--replSet", 
        "rs_shard1", 
        "--bind_ip_all", 
        "--port", 
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongosh","--port", "27017", "--eval", "db.runCommand('ping').ok", "--quiet" ]
      interval: 5s
      timeout: 15s
      retries: 3

  shard1-3:
    image: mongo:latest
    container_name: shard1-3
    restart: always
    ports:
      - "27023:27017"
    volumes:
      - shard1-3-data:/data/db
    command:
      [
        "mongod", 
        "--shardsvr", 
        "--replSet", 
        "rs_shard1", 
        "--bind_ip_all", 
        "--port", 
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongosh","--port", "27017", "--eval", "db.runCommand('ping').ok", "--quiet" ]
      interval: 5s
      timeout: 15s
      retries: 3

  # Второй шард
  shard2-1:
    image: mongo:latest
    container_name: shard2-1
    restart: always
    ports:
      - "27024:27017"
    volumes:
      - shard2-1-data:/data/db
    command:
      [
        "mongod", 
        "--shardsvr", 
        "--replSet", 
        "rs_shard2", 
        "--bind_ip_all", 
        "--port", 
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongosh","--port", "27017", "--eval", "db.runCommand('ping').ok", "--quiet" ]
      interval: 5s
      timeout: 15s
      retries: 3

  shard2-2:
    image: mongo:latest
    container_name: shard2-2
    restart: always
    ports:
      - "27025:27017"
    volumes:
      - shard2-2-data:/data/db
    command:
      [
        "mongod", 
        "--shardsvr", 
        "--replSet", 
        "rs_shard2", 
        "--bind_ip_all", 
        "--port", 
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongosh","--port", "27017", "--eval", "db.runCommand('ping').ok", "--quiet" ]
      interval: 5s
      timeout: 15s
      retries: 3

  shard2-3:
    image: mongo:latest
    container_name: shard2-3
    restart: always
    ports:
      - "27026:27017"
    volumes:
      - shard2-3-data:/data/db
    command:
      [
        "mongod", 
        "--shardsvr", 
        "--replSet", 
        "rs_shard2", 
        "--bind_ip_all", 
        "--port", 
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongosh","--port", "27017", "--eval", "db.runCommand('ping').ok", "--quiet" ]
      interval: 5s
      timeout: 15s
      retries: 3

  # Сервер конфигурации
  configSrv:
    image: mongo:latest
    container_name: configSrv
    restart: always
    ports:
      - "27027:27017"
    volumes:
      - config-data:/data/db
    command:
      [
        "mongod", 
        "--configsvr", 
        "--replSet", 
        "config_server", 
        "--bind_ip_all", 
        "--port", 
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongosh","--port", "27017", "--eval", "db.runCommand('ping').ok", "--quiet" ]
      interval: 5s
      timeout: 15s
      retries: 3

  # Роутеры
  mongos_router:
    image: mongo:latest
    container_name: mongos_router
    restart: always
    depends_on:
      - configSrv
    ports:
      - "27028:27017"
    command:
      [
        "mongos", 
        "--configdb", 
        "config_server/configSrv:27017", 
        "--bind_ip_all", 
        "--port", 
        "27017"
      ]
    healthcheck:
      test: [ "CMD", "mongosh","--port", "27017", "--eval", "db.runCommand('ping').ok", "--quiet" ]
      interval: 5s
      timeout: 15s
      retries: 3

  # API приложение
  pymongo_api:
    container_name: pymongo_api
    build: 
      context: api_app
      dockerfile: Dockerfile
    image: kazhem/pymongo_api:1.0.0
    depends_on:
      - mongos_router
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos_router:27017"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: redis://redis_node:6379

volumes:
  #redis
  redis_node_data:
  #mongo
  config-data:
  shard1-1-data:
  shard1-2-data:
  shard1-3-data:
  shard2-1-data:
  shard2-2-data:
  shard2-3-data: